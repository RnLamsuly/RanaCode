<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RanaBPM - 手元展览馆 | RnLamsuly的音游主页</title>
    <link rel="stylesheet" href="videoList.css">
    <link rel="icon" href="logo.png">
</head>
<body>
<div class="handcam-app">
    <!-- 左侧时间线导航 (git log风格) -->
    <div class="timeline-nav">
        <div class="timeline-header">
            <h2>手元列表</h2>
            <p>按发布时间排序</p>
        </div>
        <div id="timelineList" class="timeline-list">
            <div class="loading-timeline" style="padding:1rem;color:#ccc;">加载中...</div>
        </div>
    </div>

    <!-- 右侧展示区 -->
    <div class="main-content">
        <div class="video-player-wrapper" id="videoContainer">
            <iframe id="biliIframe" src="about:blank" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="description-panel" id="infoPanel">
            <div class="description-title">✨ 欢迎来到手元展览馆</div>
            <div class="description-text">点击左侧时间线中的任意视频，即可观看对应手元。<br>已更新手元按时间倒序排列，计划手元展示未来录制清单~</div>
        </div>
    </div>
</div>

<script src="tool.js"></script>
</body>
</html>
