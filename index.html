<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RanaCode - 算法题解</title>
    <link rel="stylesheet" href="indexStyle.css">
    <link rel="icon" href="./Sample/RanaBPM/logo.png">
</head>
<body onload="timeEvent()">
<script src="indexTool.js"></script>
<div class="main-container">
    <div class="hero-section">
        <h1 class="hero-title" id="welcome">你好！<br>欢迎来到RanaCode！</h1>
        <div class="hero-greeting" id="timer">
            现在是-年-月-日-时-分
        </div>
    </div>

    <div class="middle-dashboard">
        <div class="glass-card left-card">
            <div class="card-content" onclick="location.href='./LinK/LinKList.html'">
                <div class="card-title">LinK 题单</div>
                <div class="preview-area">
                    <div class="preview-placeholder">点击进入 LinK 题解列表</div>
                    <div class="preview-text">算法题解 / 思路分析 / 代码实现</div>
                </div>
            </div>
        </div>

        <div class="glass-card right-card">
            <div class="card-content" onclick="location.href='./JD/JDList.html'">
                <div class="card-title">JD 题单</div>
                <div class="preview-area">
                    <div class="preview-placeholder">点击进入 JD 题解列表</div>
                    <div class="preview-text">算法题解 / 思路分析 / 代码实现</div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
