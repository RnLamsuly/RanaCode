<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>JD 题单 - RanaCode</title>
    <link rel="stylesheet" href="../shared/solutionStyle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css">
    <link rel="icon" href="../Sample/RanaBPM/logo.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>
    <script>
        // MathJax 配置
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$']],
                displayMath: [['$$', '$$']],
                processEscapes: true,
                macros: {
                    "&": "{\\unicode{x26}}"
                }
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script type="module" src="https://www.livere.org/livere-widget.js"></script>
    <style>
        .footer-link { color: inherit; text-decoration: none; }
        .footer-link:hover { color: #90EE90; }

        /* ========== 题目跳转卡片 ========== */
        .jump-card {
            margin-top: 1.5rem;
        }

        .jump-desc {
            font-size: 0.9rem;
            color: rgba(30, 47, 53, 0.7);
            line-height: 1.5;
            margin: 0;
        }

        .jump-input-row {
            display: flex;
            align-items: center;
            gap: 0;
        }

        .jump-prefix {
            font-size: 0.95rem;
            font-weight: 650;
            color: #1e2f35;
            background: rgba(255, 255, 255, 0.35);
            padding: 0.7rem 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-right: none;
            border-radius: 0.8rem 0 0 0.8rem;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .jump-input {
            flex: 1;
            min-width: 0;
            padding: 0.7rem 0.6rem;
            font-size: 0.95rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-left: none;
            border-right: none;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(6px);
            color: #1e2f35;
            outline: none;
            transition: all 0.25s ease;
            font-family: inherit;
        }

        .jump-input::placeholder {
            color: rgba(30, 47, 53, 0.4);
        }

        .jump-input:focus {
            background: rgba(255, 255, 255, 0.45);
        }

        .jump-input:focus ~ .jump-btn {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(91, 200, 168, 0.15);
        }

        .jump-btn {
            font-size: 0.9rem;
            font-weight: 600;
            color: #ffffff;
            background: rgba(91, 200, 168, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-left: none;
            padding: 0.7rem 1.2rem;
            border-radius: 0 0.8rem 0.8rem 0;
            cursor: pointer;
            backdrop-filter: blur(4px);
            transition: all 0.25s ease;
            white-space: nowrap;
            flex-shrink: 0;
            font-family: inherit;
        }

        .jump-btn:hover {
            background: rgba(91, 200, 168, 0.75);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(91, 200, 168, 0.25);
        }
    </style>
</head>
<body>
    <script src="JDTool.js"></script>

    <div class="main-container">
        <!-- 顶部导航条 -->
        <div class="top-bar">
            <a href="../index.html" class="back-link">返回首页</a>
            <span class="page-title">JD 题单</span>
            <span class="page-subtitle">算法题解列表</span>
        </div>

        <!-- 主体两栏布局 -->
        <div class="content-wrapper">
            <!-- 左侧列表区域 (2/3) -->
            <div class="left-panel">
                <div class="list-container" id="listContainer">
                    <!-- JS 动态生成列表卡片 -->
                </div>
                <div class="empty-hint" id="emptyHint" style="display:none;">
                    没有找到匹配的题目
                </div>
            </div>

            <!-- 右侧搜索区域 (1/3) -->
            <div class="right-panel">
                <div class="search-card">
                    <div class="search-label">搜索题目</div>
                    <input
                        type="text"
                        id="searchInput"
                        class="search-input"
                        placeholder="输入题目标题关键字..."
                        autocomplete="off"
                    >
                    <div class="search-hint" id="searchHint">
                        共 <span id="totalCount">0</span> 道题目
                    </div>
                </div>

                <div class="search-card jump-card">
                    <div class="search-label">题目跳转</div>
                    <p class="jump-desc">如果你没有XMUOJ的账号，可以在下方输入题目编号以查看复刻题目</p>
                    <div class="jump-input-row">
                        <span class="jump-prefix">JD</span>
                        <input
                            type="text"
                            id="jumpInput"
                            class="jump-input"
                            placeholder="(例如: 01)"
                            autocomplete="off"
                        >
                        <button id="jumpBtn" class="jump-btn">跳转</button>
                    </div>
                </div>

                <div class="comment-card">
                    <livere-comment client-id="noGDksFaEhflSS2JdhAJ"></livere-comment>
                </div>
            </div>
        </div>
    </div>
<footer style="text-align: center; font-size: 0.85rem; padding: 20px 0; color: #FFFFFF;">
    Developed by <a href="https://space.bilibili.com/1896204321" target="_blank" class="footer-link">RnLamsuly</a> · <a href="https://github.com/RnLamsuly/RanaCode" target="_blank" class="footer-link">Repositories</a>
</footer>
</body>
</html>
